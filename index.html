<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Activaciones PRO</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0A0E1A;color:#F1F5F9;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh}
input,textarea,select{background:#1a2235;border:1px solid #1e2d45;color:#F1F5F9;padding:10px 14px;border-radius:8px;font-family:inherit;font-size:14px;width:100%;outline:none;transition:border .15s}
input:focus,textarea:focus,select:focus{border-color:#F59E0B}
textarea{resize:vertical;min-height:70px}
label{font-size:11px;color:#64748B;font-weight:600;letter-spacing:.05em;text-transform:uppercase;display:block;margin-bottom:5px}
button{cursor:pointer;font-family:inherit;font-weight:600;border:none;border-radius:8px;transition:all .15s}
button:hover{opacity:.82}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:#F59E0B;border-radius:2px}
</style>
</head>
<body>
<div id="APP"></div>
<script>
const G={surface:"#111827",card:"#1a2235",border:"#1e2d45",accent:"#F59E0B",accentLight:"#FCD34D",green:"#10B981",red:"#EF4444",blue:"#3B82F6",purple:"#8B5CF6",text:"#F1F5F9",muted:"#64748B"};

const USERS_BASE=[
  {id:"admin1",  name:"Administrador",   user:"admin",       pass:"admin123",  role:"admin",    activo:true},
  {id:"u_pablo", name:"Pablo Lorenzo",   user:"admin2",      pass:"admin123",  role:"admin",    activo:true},
  {id:"u_luis",  name:"Luis Roulet",     user:"Repsol",      pass:"Luis123",   role:"promotor", activo:true},
  {id:"u_jose",  name:"Jose Aguilar",    user:"Shell",       pass:"Jose123",   role:"promotor", activo:true},
  {id:"u_gaby",  name:"Gaby Valdez",     user:"Repsol2",     pass:"Gaby123",   role:"promotor", activo:true},
  {id:"u_cris",  name:"Cristofer Valdez",user:"Shell2",      pass:"Cristo123", role:"promotor", activo:true},
  {id:"u_rene",  name:"Rene Estrada",    user:"egm",         pass:"Rene123",   role:"promotor", activo:true},
  {id:"u_diego", name:"Diego Valez",     user:"egm2",        pass:"Diego123",  role:"promotor", activo:true},
  {id:"u_cyntia",name:"Cyntia",          user:"lubriimport", pass:"lubri123",  role:"cliente",  activo:true},
  {id:"u_evelyn",name:"Evelyn",          user:"egmcliente",  pass:"egm123",    role:"cliente",  activo:true},
];

function getUsers(){
  try{const x=JSON.parse(localStorage.getItem("ap_extra")||"[]");return[...USERS_BASE,...x];}
  catch{return USERS_BASE;}
}
function saveExtra(all){
  localStorage.setItem("ap_extra",JSON.stringify(all.filter(u=>!USERS_BASE.find(b=>b.id===u.id))));
}
function getDB(){
  try{return JSON.parse(localStorage.getItem("ap_db")||'{"activaciones":[],"encuestas":[]}');}
  catch{return{activaciones:[],encuestas:[]};}
}
function saveDB(db){localStorage.setItem("ap_db",JSON.stringify(db));}

const uid=()=>Math.random().toString(36).slice(2,8);
const nowStr=()=>new Date().toLocaleString("es-MX",{hour12:false});
const todayStr=()=>new Date().toLocaleDateString("es-MX");

let STATE={user:null,view:"login"};

// ── TOAST ──────────────────────────────────────────────────────────────────
function toast(msg,type){
  type=type||"info";
  const colors={info:G.blue,success:G.green,warning:G.accent,error:G.red};
  let tc=document.getElementById("tc");
  if(!tc){tc=document.createElement("div");tc.id="tc";tc.style.cssText="position:fixed;top:14px;right:14px;z-index:9999;display:flex;flex-direction:column;gap:8px;max-width:300px;pointer-events:none";document.body.appendChild(tc);}
  const t=document.createElement("div");
  t.style.cssText="background:"+G.card+";border:1px solid "+colors[type]+";border-left:4px solid "+colors[type]+";border-radius:10px;padding:11px 15px;font-size:13px;color:"+G.text+";box-shadow:0 4px 20px rgba(0,0,0,.6)";
  t.textContent=msg;tc.appendChild(t);
  setTimeout(function(){t.remove();},4000);
}

// ── DOM HELPERS ────────────────────────────────────────────────────────────
function mk(tag,style,children){
  var e=document.createElement(tag);
  if(style)Object.assign(e.style,style);
  if(children){
    if(!Array.isArray(children))children=[children];
    children.forEach(function(c){
      if(c==null||c===false)return;
      if(typeof c==="string")e.appendChild(document.createTextNode(c));
      else e.appendChild(c);
    });
  }
  return e;
}
function on(el,ev,fn){el.addEventListener(ev,fn);return el;}
function div(style,children){return mk("div",style,children);}
function span(style,text){var s=mk("span",style);s.textContent=text;return s;}
function card(children,extra){
  var s=Object.assign({background:G.card,border:"1px solid "+G.border,borderRadius:"12px",padding:"18px"},extra||{});
  return div(s,children);
}
function badge(label,color){
  color=color||G.accent;
  var s=mk("span",{background:color+"22",color:color,fontSize:"11px",fontWeight:"700",padding:"2px 10px",borderRadius:"20px",border:"1px solid "+color+"44"});
  s.textContent=label;return s;
}
function secTitle(text,color){
  color=color||G.accent;
  var d=div({fontWeight:"800",fontSize:"22px",color:color,letterSpacing:"2px",textTransform:"uppercase",marginBottom:"6px"});
  d.textContent=text;return d;
}
function mkBtn(label,onClick,bg,fg,extra){
  bg=bg||G.accent;fg=fg||"#000";
  var b=mk("button",Object.assign({background:bg,color:fg,padding:"9px 18px",fontSize:"13px"},extra||{}));
  b.textContent=label;
  b.addEventListener("click",onClick);
  return b;
}
function lbl(text){var l=mk("label");l.textContent=text;return l;}
function inp(ph,val,onCh,type){
  type=type||"text";
  var i=mk("input");i.type=type;i.placeholder=ph||"";i.value=val||"";
  i.addEventListener("input",function(e){onCh(e.target.value);});
  return i;
}
function fld(labelTxt,inputEl,mb){
  return div({marginBottom:mb||"13px"},[lbl(labelTxt),inputEl]);
}
function selEl(opts,val,onCh){
  var s=mk("select");
  opts.forEach(function(o){
    var opt=mk("option");opt.value=o[0];opt.textContent=o[1];
    if(o[0]===val)opt.selected=true;
    s.appendChild(opt);
  });
  s.addEventListener("change",function(e){onCh(e.target.value);});
  return s;
}

// ── RENDER ─────────────────────────────────────────────────────────────────
function render(){
  var root=document.getElementById("APP");
  root.innerHTML="";
  if(!STATE.user){root.appendChild(renderLogin());return;}
  root.appendChild(renderShell());
}

// ── LOGIN ──────────────────────────────────────────────────────────────────
function renderLogin(){
  var u="",p="";
  var errEl=div({color:G.red,fontSize:"12px",display:"none",marginBottom:"10px"});
  var uInp=inp("Tu usuario","",function(v){u=v;});
  var pInp=inp("Tu contraseña","",function(v){p=v;},"password");

  function doLogin(){
    var all=getUsers();
    var found=null;
    for(var i=0;i<all.length;i++){
      if(all[i].user===u.trim()&&all[i].pass===p&&all[i].activo!==false){found=all[i];break;}
    }
    if(found){
      STATE.user=found;
      STATE.view=found.role==="cliente"?"cliente":"dashboard";
      toast("¡Bienvenido, "+found.name+"!","success");
      render();
    }else{
      errEl.textContent="Usuario o contraseña incorrectos";
      errEl.style.display="block";
      toast("Credenciales incorrectas","error");
    }
  }
  uInp.addEventListener("keydown",function(e){if(e.key==="Enter")doLogin();});
  pInp.addEventListener("keydown",function(e){if(e.key==="Enter")doLogin();});

  var refRows=getUsers().map(function(u){
    return div({display:"flex",justifyContent:"space-between",alignItems:"center",padding:"5px 0",borderBottom:"1px solid "+G.border,fontSize:"12px"},[
      span({color:G.text,fontWeight:"600"},u.user),
      span({color:G.muted},u.pass),
      badge(u.role,u.role==="admin"?G.red:u.role==="promotor"?G.accent:G.blue),
    ]);
  });

  return div({minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:"24px"},[
    div({width:"100%",maxWidth:"400px"},[
      div({textAlign:"center",marginBottom:"32px"},[
        div({fontWeight:"900",fontSize:"42px",color:G.accent,letterSpacing:"4px",textTransform:"uppercase"},["⚡ Activaciones"]),
        div({fontWeight:"700",fontSize:"16px",color:G.muted,letterSpacing:"8px",textTransform:"uppercase"},["PRO"]),
      ]),
      card([errEl,fld("Usuario",uInp),fld("Contraseña",pInp),mkBtn("Ingresar →",doLogin,G.accent,"#000",{width:"100%",padding:"13px",fontSize:"16px",marginTop:"6px"})]),
      div({marginTop:"20px",background:G.surface,borderRadius:"10px",padding:"16px"},[
        div({fontWeight:"700",fontSize:"11px",color:G.accentLight,marginBottom:"10px",letterSpacing:"1px",textTransform:"uppercase"},["Referencia de usuarios"]),
      ].concat(refRows)),
    ])
  ]);
}

// ── SHELL ──────────────────────────────────────────────────────────────────
function renderShell(){
  var u=STATE.user;
  var isAdmin=u.role==="admin";
  var isProm=u.role==="promotor";
  var RC={admin:G.red,promotor:G.accent,cliente:G.blue};

  var navItems=isAdmin
    ?[["dashboard","📊 Dashboard"],["nueva","🚀 Nueva"],["encuesta","📋 Encuesta"],["inventario","📦 Inventario"],["usuarios","👥 Usuarios"]]
    :isProm
    ?[["dashboard","📊 Dashboard"],["nueva","🚀 Nueva activación"],["encuesta","📋 Encuesta"]]
    :[["cliente","📆 Mis activaciones"]];

  var navBtns=navItems.map(function(item){
    var nb=mk("button",{padding:"13px 18px",background:"none",border:"none",
      borderBottom:"3px solid "+(STATE.view===item[0]?G.accent:"transparent"),
      color:STATE.view===item[0]?G.accent:G.muted,
      fontFamily:"inherit",fontWeight:"600",fontSize:"13px",cursor:"pointer",whiteSpace:"nowrap"});
    nb.textContent=item[1];
    nb.addEventListener("click",function(){STATE.view=item[0];render();});
    return nb;
  });

  var header=div({background:G.surface,borderBottom:"1px solid "+G.border,padding:"0 20px"},[
    div({maxWidth:"860px",margin:"0 auto",display:"flex",alignItems:"center",justifyContent:"space-between",height:"58px"},[
      div({fontWeight:"900",fontSize:"18px",letterSpacing:"3px",color:G.accent,textTransform:"uppercase"},["⚡ Activaciones PRO"]),
      div({display:"flex",alignItems:"center",gap:"10px"},[
        span({fontSize:"13px",color:G.muted},u.name),
        badge(u.role,RC[u.role]),
        mkBtn("Salir",function(){STATE.user=null;STATE.view="login";render();},"transparent",G.muted,{border:"1px solid "+G.border,padding:"5px 12px",fontSize:"12px"}),
      ]),
    ]),
  ]);

  var nav=div({background:G.surface,borderBottom:"1px solid "+G.border,overflowX:"auto"},[
    div({maxWidth:"860px",margin:"0 auto",display:"flex"},navBtns),
  ]);

  var content=div({padding:"28px 20px",maxWidth:"860px",margin:"0 auto"});
  if(STATE.view==="dashboard")content.appendChild(renderDashboard());
  else if(STATE.view==="nueva")content.appendChild(renderNueva());
  else if(STATE.view==="encuesta")content.appendChild(renderEncuesta());
  else if(STATE.view==="inventario")content.appendChild(renderInventario());
  else if(STATE.view==="usuarios"&&isAdmin)content.appendChild(renderUsuarios());
  else if(STATE.view==="cliente")content.appendChild(renderCliente());

  return div({},[header,nav,content]);
}

// ── DASHBOARD ──────────────────────────────────────────────────────────────
function renderDashboard(){
  var db=getDB();var acts=db.activaciones;var encs=db.encuestas;
  var hoy=acts.filter(function(a){return a.fecha===todayStr();});
  var totalV=acts.reduce(function(s,a){return s+(a.ventas?a.ventas.length:0);},0);
  var totalP=acts.reduce(function(s,a){return s+(a.premiosEntregados||0);},0);
  var wrap=div({});

  wrap.appendChild(div({display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:"12px",marginBottom:"20px"},[
    secTitle("DASHBOARD"),
    mkBtn("📤 Exportar CSV",exportCSV,G.green,"#fff",{fontSize:"12px",padding:"8px 16px"}),
  ]));

  var kpis=div({display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(100px,1fr))",gap:"12px",marginBottom:"24px"});
  [{l:"Activaciones",v:acts.length,c:G.accent,i:"🚀"},{l:"Hoy",v:hoy.length,c:G.blue,i:"📅"},{l:"Ventas",v:totalV,c:G.green,i:"💰"},{l:"Premios",v:totalP,c:G.purple,i:"🎁"},{l:"Encuestas",v:encs.length,c:G.red,i:"📋"}].forEach(function(k){
    var d=card([div({fontSize:"22px"},[k.i]),div({fontWeight:"800",fontSize:"28px",color:k.c},[String(k.v)]),div({fontSize:"10px",color:G.muted,textTransform:"uppercase",letterSpacing:"1px"},[k.l])],{textAlign:"center",padding:"14px"});
    kpis.appendChild(d);
  });
  wrap.appendChild(kpis);

  if(!acts.length){
    wrap.appendChild(card([div({color:G.muted,textAlign:"center",padding:"30px"},["No hay activaciones aún. ¡Crea una nueva en 🚀 Nueva!"])]));
    return wrap;
  }

  wrap.appendChild(div({fontWeight:"700",marginBottom:"10px",color:G.accentLight,fontSize:"13px"},["📋 HISTORIAL DE ACTIVACIONES"]));
  var sorted=[].concat(acts).reverse();
  sorted.forEach(function(a){
    var actEncs=encs.filter(function(e){return e.activacionId===a.id;});
    var usado=(+a.inicioInventario||0)-(+(a.finalInventario||0));
    var aC=card([
      div({display:"flex",justifyContent:"space-between",flexWrap:"wrap",gap:"8px",marginBottom:"8px"},[
        div({},[
          div({fontWeight:"700",fontSize:"15px"},[a.marca]),
          div({fontSize:"12px",color:G.muted},[a.nombre+" · "+(a.lugar||"").slice(0,40)]),
          div({fontSize:"11px",color:G.muted},[a.fecha+" · "+a.timestamp]),
        ]),
        div({display:"flex",gap:"6px",flexWrap:"wrap"},[
          badge((a.ventas?a.ventas.length:0)+" ventas",G.green),
          badge((a.premiosEntregados||0)+" premios",G.purple),
        ]),
      ]),
    ],{marginBottom:"12px"});
    if(a.inicioInventario){
      var invEl=div({fontSize:"12px",background:G.surface,padding:"6px 12px",borderRadius:"6px",marginBottom:"8px"});
      invEl.textContent="Inventario: inicio "+a.inicioInventario+" · final "+(a.finalInventario||"—")+" · usados "+usado;
      aC.appendChild(invEl);
    }
    actEncs.forEach(function(enc){
      var encEl=div({background:G.surface,borderRadius:"6px",padding:"6px 10px",fontSize:"12px",marginTop:"4px"});
      encEl.textContent="⭐".repeat(enc.calificacion)+(enc.nombre?" · "+enc.nombre:"")+(enc.comentario?" — "+enc.comentario:"");
      aC.appendChild(encEl);
    });
    wrap.appendChild(aC);
  });
  return wrap;
}

// ── NUEVA ACTIVACIÓN ───────────────────────────────────────────────────────
function renderNueva(){
  var form={nombre:STATE.user.name,lugar:"",marca:"",inicioInventario:"",timestamp:"",id:uid()};
  var ventas=[],premios=[],finalInv="";
  var wrap=div({maxWidth:"640px",margin:"0 auto"});

  function paso1(){
    wrap.innerHTML="";
    wrap.appendChild(secTitle("NUEVA ACTIVACIÓN"));
    wrap.appendChild(div({color:G.muted,fontSize:"14px",marginBottom:"20px"},["Promotor: "+STATE.user.name]));

    var geoSt=div({fontSize:"11px",color:G.muted,marginTop:"4px"});
    var nI=inp("Tu nombre completo",form.nombre,function(v){form.nombre=v;});
    var lI=inp("Nombre o dirección del lugar",form.lugar,function(v){form.lugar=v;});
    var mI=inp("Ej: Repsol, Shell...",form.marca,function(v){form.marca=v;});
    var invI=inp("Cantidad de premios al inicio",form.inicioInventario,function(v){form.inicioInventario=v;},"number");

    var geoBtn=mkBtn("📍 GPS",function(){
      geoSt.textContent="Obteniendo ubicación...";
      if(navigator.geolocation){
        navigator.geolocation.getCurrentPosition(function(pos){
          var loc=pos.coords.latitude.toFixed(5)+", "+pos.coords.longitude.toFixed(5);
          form.lugar=loc;lI.value=loc;geoSt.textContent="✅ Capturado";
        },function(){geoSt.textContent="❌ Sin GPS";});
      }
    },"transparent",G.muted,{border:"1px solid "+G.border,padding:"10px 14px",fontSize:"12px",flexShrink:"0"});

    var lugarRow=div({display:"flex",gap:"8px"},[lI,geoBtn]);
    wrap.appendChild(card([
      fld("Nombre del promotor",nI),
      div({marginBottom:"13px"},[lbl("Lugar / Punto de venta"),lugarRow,geoSt]),
      fld("Marca que se promueve",mI),
      fld("Inventario inicial de premios",invI),
    ],{marginBottom:"16px"}));

    wrap.appendChild(mkBtn("🚀 Iniciar Activación",function(){
      if(!form.nombre||!form.lugar||!form.marca){toast("Completa nombre, lugar y marca","error");return;}
      form.timestamp=nowStr();
      toast("🚀 Activación iniciada: "+form.marca,"success");
      paso2();
    },G.accent,"#000",{width:"100%",padding:"14px",fontSize:"16px"}));
  }

  function paso2(){
    wrap.innerHTML="";
    wrap.appendChild(div({background:G.green+"15",border:"1px solid "+G.green+"40",borderRadius:"12px",padding:"12px 18px",marginBottom:"16px"},[
      div({fontWeight:"800",fontSize:"16px",color:G.green,letterSpacing:"2px",textTransform:"uppercase"},["🟢 Activación en curso"]),
      div({fontSize:"12px",color:G.muted},[form.nombre+" · "+form.marca+" · "+form.timestamp]),
    ]));

    // Timer
    var secs=600;
    var timerVal=div({fontWeight:"900",fontSize:"52px",color:G.green,lineHeight:"1",textAlign:"center"},["10:00"]);
    var timerBar=div({position:"absolute",bottom:"0",left:"0",height:"3px",background:G.green,width:"0%",transition:"width 1s linear"});
    var timerCard=card([
      div({fontSize:"11px",color:G.muted,marginBottom:"6px",textAlign:"center",letterSpacing:"2px",textTransform:"uppercase"},["Próxima promoción en"]),
      timerVal,
      div({fontSize:"12px",color:G.muted,marginTop:"4px",textAlign:"center"},["Recordatorio cada 10 minutos"]),
      timerBar,
    ],{position:"relative",overflow:"hidden",marginBottom:"16px"});
    wrap.appendChild(timerCard);

    var timerIv=setInterval(function(){
      secs--;
      if(secs<=0){secs=600;toast("🔊 ¡HORA DE PROMOCIÓN EN AUDIO!","warning");}
      var m=Math.floor(secs/60),s=secs%60;
      timerVal.textContent=String(m).padStart(2,"0")+":"+String(s).padStart(2,"0");
      var col=secs<60?G.red:secs<180?G.accent:G.green;
      timerVal.style.color=col;timerBar.style.background=col;
      timerBar.style.width=((600-secs)/600*100)+"%";
    },1000);

    // Ventas
    var vLista=div({marginTop:"8px"});
    var cV=div({fontSize:"12px",color:G.green,fontWeight:"700",marginTop:"8px"},["Total: 0 ventas"]);
    var vNI=inp("Descripción de la venta","",function(){});
    wrap.appendChild(card([
      div({fontWeight:"800",fontSize:"18px",color:G.accentLight,marginBottom:"12px",textTransform:"uppercase"},["💰 Registro de Ventas"]),
      fld("Nota",vNI,"8px"),
      mkBtn("➕ Agregar venta",function(){
        var nota=vNI.value;
        ventas.push({nota:nota,id:uid(),hora:nowStr()});
        vNI.value="";
        var row=div({background:G.surface,borderRadius:"8px",padding:"7px 12px",marginTop:"6px",fontSize:"13px"});
        row.textContent="#"+ventas.length+": "+(nota||"Sin nota");
        vLista.appendChild(row);
        cV.textContent="Total: "+ventas.length+" ventas";
        toast("💰 Venta #"+ventas.length+" registrada","success");
      },G.green,"#fff",{padding:"9px 18px",fontSize:"13px"}),
      vLista,cV,
    ],{marginBottom:"14px"}));

    // Premios
    var pLista=div({marginTop:"8px"});
    var cP=div({fontSize:"12px",color:G.purple,fontWeight:"700",marginTop:"8px"},["Premios entregados: 0"]);
    var pCI=inp("Nombre del cliente que ganó","",function(){});
    var pMI=inp("Motivo / Actividad ganada","",function(){});
    wrap.appendChild(card([
      div({fontWeight:"800",fontSize:"18px",color:G.purple,marginBottom:"12px",textTransform:"uppercase"},["🎁 Premios Entregados"]),
      fld("Nombre del cliente",pCI,"8px"),
      fld("Motivo",pMI,"8px"),
      mkBtn("🎁 Registrar premio",function(){
        var cli=pCI.value;
        if(!cli){toast("Agrega el nombre del cliente","error");return;}
        var mot=pMI.value;
        premios.push({cliente:cli,motivo:mot,id:uid(),hora:nowStr()});
        pCI.value="";pMI.value="";
        var row=div({background:G.surface,borderRadius:"8px",padding:"7px 12px",marginTop:"6px",fontSize:"13px"});
        row.textContent="🎁 "+cli+(mot?" — "+mot:"");
        pLista.appendChild(row);
        cP.textContent="Premios entregados: "+premios.length;
        toast("🎁 Premio a: "+cli,"success");
      },G.purple,"#fff",{width:"100%",padding:"10px",fontSize:"13px",marginTop:"6px"}),
      pLista,cP,
    ],{marginBottom:"14px"}));

    // Cierre
    var fI=inp("Premios restantes al cierre","",function(v){finalInv=v;},"number");
    var cuadreInfo=div({fontSize:"12px",background:G.surface,padding:"8px 12px",borderRadius:"6px",marginTop:"8px",display:"none"});
    fI.addEventListener("input",function(){
      if(form.inicioInventario&&fI.value){
        var usado=(+form.inicioInventario||0)-(+fI.value||0);
        var diff=usado-premios.length;
        cuadreInfo.textContent="Inicio: "+form.inicioInventario+" · Final: "+fI.value+" · Usados: "+usado+" · Registrados: "+premios.length+(diff!==0?" ⚠️ Diferencia: "+diff:" ✅ Cuadre OK");
        cuadreInfo.style.display="block";
        cuadreInfo.style.color=diff!==0?G.red:G.green;
      }
    });
    wrap.appendChild(card([
      div({fontWeight:"800",fontSize:"18px",color:G.red,marginBottom:"12px",textTransform:"uppercase"},["🔒 Cierre"]),
      fld("Inventario final de premios",fI,"4px"),
      cuadreInfo,
    ],{marginBottom:"14px"}));

    wrap.appendChild(mkBtn("💾 Guardar y cerrar activación",function(){
      clearInterval(timerIv);
      var db=getDB();
      db.activaciones.push(Object.assign({},form,{ventas:ventas,premios:premios,finalInventario:finalInv,premiosEntregados:premios.length,fecha:todayStr()}));
      saveDB(db);
      toast("✅ Guardado · "+ventas.length+" ventas · "+premios.length+" premios","success");
      STATE.view="dashboard";render();
    },G.accent,"#000",{width:"100%",padding:"14px",fontSize:"15px"}));
  }

  paso1();return wrap;
}

// ── ENCUESTA ───────────────────────────────────────────────────────────────
function renderEncuesta(){
  var wrap=div({maxWidth:"520px",margin:"0 auto"});
  var form={activacionId:"",calificacion:0,comentario:"",nombre:""};
  var db=getDB();var acts=db.activaciones;

  wrap.appendChild(secTitle("ENCUESTA DEL CLIENTE"));
  wrap.appendChild(div({color:G.muted,fontSize:"14px",marginBottom:"20px"},["¿Cómo viste nuestra activación hoy?"]));

  var errEl=div({color:G.red,fontSize:"12px",display:"none",marginBottom:"10px"});
  var nI=inp("Tu nombre (opcional)","",function(v){form.nombre=v;});
  var aOpts=[["","-- Selecciona la activación --"]].concat(acts.map(function(a){return[a.id,a.fecha+" · "+a.marca+" · "+a.nombre];}));
  var aSel=selEl(aOpts,form.activacionId,function(v){form.activacionId=v;});

  var stars=[];
  var starsRow=div({display:"flex",gap:"10px",marginTop:"6px"});
  for(var n=1;n<=5;n++){
    (function(num){
      var s=mk("button",{width:"46px",height:"46px",borderRadius:"10px",fontSize:"20px",border:"2px solid "+G.border,background:G.surface,cursor:"pointer"});
      s.textContent="⭐";
      s.addEventListener("click",function(){
        form.calificacion=num;
        stars.forEach(function(st,i){st.style.borderColor=i<num?G.accent:G.border;st.style.background=i<num?G.accent+"22":G.surface;});
      });
      stars.push(s);starsRow.appendChild(s);
    })(n);
  }

  var comI=mk("textarea");comI.placeholder="¿Qué te pareció? ¿Alguna sugerencia?";
  comI.addEventListener("input",function(e){form.comentario=e.target.value;});

  wrap.appendChild(card([
    errEl,
    fld("Tu nombre",nI),
    fld("Activación",aSel),
    div({marginBottom:"14px"},[lbl("Calificación general"),starsRow]),
    fld("Comentario",comI,"10px"),
    mkBtn("Enviar encuesta ✉️",function(){
      if(!form.calificacion||!form.activacionId){errEl.textContent="Selecciona activación y calificación";errEl.style.display="block";return;}
      var db2=getDB();
      db2.encuestas.push(Object.assign({},form,{id:uid(),timestamp:nowStr()}));
      saveDB(db2);
      toast("📋 Encuesta enviada · "+"⭐".repeat(form.calificacion),"success");
      wrap.innerHTML="";
      wrap.appendChild(div({textAlign:"center",padding:"60px 20px"},[
        div({fontSize:"56px",marginBottom:"16px"},["🎉"]),
        div({fontWeight:"800",fontSize:"26px",color:G.green,letterSpacing:"2px",textTransform:"uppercase"},["¡Gracias por tu opinión!"]),
        div({marginTop:"24px"},[mkBtn("Nueva encuesta",function(){STATE.view="encuesta";render();},G.accent,"#000",{padding:"10px 24px"})]),
      ]));
    },G.accent,"#000",{width:"100%",padding:"13px",fontSize:"15px",marginTop:"6px"}),
  ]));
  return wrap;
}

// ── INVENTARIO ─────────────────────────────────────────────────────────────
function renderInventario(){
  var db=getDB();var acts=db.activaciones;
  var wrap=div({});
  wrap.appendChild(div({display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:"12px",marginBottom:"20px"},[
    secTitle("INVENTARIO DE PREMIOS"),
    mkBtn("📤 Exportar CSV",exportCSV,G.green,"#fff",{fontSize:"12px",padding:"8px 16px"}),
  ]));

  var rows=acts.map(function(a){
    var inicio=+a.inicioInventario||0,fin=+(a.finalInventario||0);
    var usados=inicio-fin,reg=a.premiosEntregados||0;
    return{fecha:a.fecha,promotor:a.nombre,marca:a.marca,inicio:inicio,fin:fin,usados:usados,reg:reg,diff:usados-reg};
  });
  function tot(k){return rows.reduce(function(s,r){return s+r[k];},0);}

  var kpis=div({display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(100px,1fr))",gap:"12px",marginBottom:"20px"});
  [{l:"Total inicio",v:tot("inicio"),c:G.blue},{l:"Total usados",v:tot("usados"),c:G.accent},{l:"Registrados",v:tot("reg"),c:G.green},{l:"Diferencia",v:tot("usados")-tot("reg"),c:tot("usados")-tot("reg")===0?G.green:G.red}].forEach(function(k){
    kpis.appendChild(card([div({fontWeight:"800",fontSize:"28px",color:k.c},[String(k.v)]),div({fontSize:"10px",color:G.muted,textTransform:"uppercase"},[k.l])],{textAlign:"center",padding:"14px"}));
  });
  wrap.appendChild(kpis);

  if(!rows.length){wrap.appendChild(card([div({color:G.muted,textAlign:"center",padding:"24px"},["Sin datos de inventario aún."])]));return wrap;}

  var tw=div({overflowX:"auto"});
  var table=mk("table",{width:"100%",borderCollapse:"collapse",fontSize:"13px"});
  var thead=mk("tr",{background:G.surface});
  ["Fecha","Promotor","Marca","Inicio","Final","Usados","Registr.","Dif."].forEach(function(h){
    var th=mk("th",{padding:"10px 12px",textAlign:"left",color:G.muted,fontWeight:"700",fontSize:"11px",textTransform:"uppercase",whiteSpace:"nowrap"});
    th.textContent=h;thead.appendChild(th);
  });
  table.appendChild(mk("thead",{},[thead]));
  var tbody=mk("tbody");
  rows.forEach(function(r){
    var tr=mk("tr",{borderBottom:"1px solid "+G.border});
    [r.fecha,r.promotor,r.marca,r.inicio,r.fin,r.usados,r.reg,r.diff===0?"✓":r.diff>0?"+"+r.diff:r.diff].forEach(function(v,i){
      var td=mk("td",{padding:"10px 12px",color:i===5?G.accent:i===6?G.green:i===7?(r.diff===0?G.green:G.red):G.text});
      td.textContent=String(v);tr.appendChild(td);
    });
    tbody.appendChild(tr);
  });
  table.appendChild(tbody);tw.appendChild(table);wrap.appendChild(tw);
  return wrap;
}

// ── USUARIOS ───────────────────────────────────────────────────────────────
function renderUsuarios(){
  var RC={admin:G.red,promotor:G.accent,cliente:G.blue};
  var RL={admin:"Administrador",promotor:"Promotor",cliente:"Cliente"};
  var wrap=div({});

  function buildList(){
    wrap.innerHTML="";
    var all=getUsers();
    wrap.appendChild(div({display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:"12px",marginBottom:"20px"},[
      div({},[secTitle("GESTIÓN DE USUARIOS"),div({color:G.muted,fontSize:"13px"},[all.length+" usuarios registrados"])]),
      mkBtn("➕ Nuevo usuario",function(){showModal("nuevo");},G.accent,"#000",{padding:"10px 20px",fontSize:"13px"}),
    ]));

    var kpis=div({display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:"12px",marginBottom:"18px"});
    ["admin","promotor","cliente"].forEach(function(r){
      var c=all.filter(function(u){return u.role===r;}).length;
      kpis.appendChild(card([div({fontWeight:"800",fontSize:"26px",color:RC[r]},[String(c)]),div({fontSize:"10px",color:G.muted,textTransform:"uppercase"},[r+"s"])],{textAlign:"center",padding:"14px"}));
    });
    wrap.appendChild(kpis);

    all.forEach(function(u){
      var isMe=u.id===STATE.user.id;
      var inactive=u.activo===false;
      var isBase=!!USERS_BASE.find(function(b){return b.id===u.id;});
      var nameParts=[span({color:G.text,fontWeight:"700",fontSize:"14px"},u.name)];
      if(isMe)nameParts.push(badge("Tú",G.green));
      if(inactive)nameParts.push(badge("Inactivo",G.muted));
      var nameRow=div({display:"flex",alignItems:"center",gap:"8px"},nameParts);

      var btns=[];
      btns.push(mkBtn("✏️ Editar",function(){showModal(u);},"transparent",G.muted,{border:"1px solid "+G.border,padding:"5px 12px",fontSize:"12px"}));
      if(!isMe&&!isBase){
        btns.push(mkBtn(inactive?"✅ Activar":"⏸ Desact.",function(){
          var all2=getUsers();
          var idx=all2.findIndex(function(x){return x.id===u.id;});
          if(idx>=0)all2[idx].activo=!all2[idx].activo;
          saveExtra(all2);toast(u.name+" "+(inactive?"activado":"desactivado"),"info");buildList();
        },inactive?G.green:"transparent",inactive?"#fff":G.muted,{border:"1px solid "+G.border,padding:"5px 12px",fontSize:"12px"}));
        btns.push(mkBtn("🗑",function(){
          if(confirm("¿Eliminar a "+u.name+"?")){
            var all3=getUsers().filter(function(x){return x.id!==u.id;});
            saveExtra(all3);toast("Usuario eliminado","success");buildList();
          }
        },G.red,"#fff",{padding:"5px 10px",fontSize:"12px"}));
      }

      wrap.appendChild(card([
        div({display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:"10px"},[
          div({display:"flex",alignItems:"center",gap:"12px"},[
            div({width:"44px",height:"44px",borderRadius:"10px",background:RC[u.role]+"22",border:"2px solid "+RC[u.role]+"44",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:"900",fontSize:"20px",color:RC[u.role],flexShrink:"0"},[u.name.charAt(0).toUpperCase()]),
            div({},[nameRow,div({fontSize:"12px",color:G.muted,marginTop:"2px"},["@"+u.user+" · "+u.pass]),div({marginTop:"4px"},[badge(RL[u.role],RC[u.role])])]),
          ]),
          div({display:"flex",gap:"6px",flexWrap:"wrap"},btns),
        ]),
      ],{marginBottom:"10px",opacity:inactive?"0.55":"1"}));
    });
  }

  function showModal(mode){
    var existing=document.getElementById("umodal");
    if(existing)existing.remove();
    var isNew=mode==="nuevo";
    var f=isNew?{name:"",user:"",pass:"",role:"promotor"}:Object.assign({},mode);
    var nI=inp("Nombre completo",f.name,function(v){f.name=v;});
    var uI=inp("Usuario para login",f.user,function(v){f.user=v;});
    var pI=inp("Contraseña",f.pass,function(v){f.pass=v;});
    var rS=selEl([["admin","Administrador — acceso total"],["promotor","Promotor — ingresa activaciones"],["cliente","Cliente — solo consulta"]],f.role,function(v){f.role=v;});
    var errM=div({color:G.red,fontSize:"12px",display:"none",marginBottom:"10px"});

    function guardar(){
      if(!f.name.trim()||!f.user.trim()||!f.pass.trim()){errM.textContent="Todos los campos son obligatorios";errM.style.display="block";return;}
      var all=getUsers();
      if(isNew){
        if(all.find(function(u){return u.user===f.user.trim();})){errM.textContent="Ese usuario ya existe";errM.style.display="block";return;}
        saveExtra(all.concat([Object.assign({},f,{id:uid(),user:f.user.trim(),activo:true})]));
        toast("✅ Usuario "+f.name+" creado","success");
      }else{
        saveExtra(all.map(function(u){return u.id===mode.id?Object.assign({},u,f,{user:f.user.trim()}):u;}));
        toast("✅ "+f.name+" actualizado","success");
      }
      document.getElementById("umodal").remove();buildList();
    }

    var title=div({fontWeight:"800",fontSize:"20px",letterSpacing:"2px",color:G.accent,marginBottom:"18px",textTransform:"uppercase"});
    title.textContent=isNew?"➕ Nuevo Usuario":"✏️ Editar: "+mode.name;
    var overlay=div({position:"fixed",inset:"0",background:"rgba(0,0,0,.8)",zIndex:"200",display:"flex",alignItems:"center",justifyContent:"center",padding:"20px"},[
      card([title,errM,fld("Nombre completo",nI),fld("Usuario",uI),fld("Contraseña",pI),div({marginBottom:"16px"},[lbl("Rol"),rS]),
        div({display:"flex",gap:"10px"},[
          mkBtn(isNew?"Crear usuario":"Guardar cambios",guardar,G.accent,"#000",{flex:"1",padding:"11px"}),
          mkBtn("Cancelar",function(){overlay.remove();},"transparent",G.muted,{flex:"1",padding:"11px",border:"1px solid "+G.border}),
        ]),
      ],{maxWidth:"420px",width:"100%"}),
    ]);
    overlay.id="umodal";
    overlay.addEventListener("click",function(e){if(e.target===overlay)overlay.remove();});
    document.body.appendChild(overlay);
  }

  buildList();return wrap;
}

// ── CLIENTE ────────────────────────────────────────────────────────────────
function renderCliente(){
  var db=getDB();var acts=db.activaciones;var encs=db.encuestas;
  var wrap=div({});
  wrap.appendChild(div({display:"flex",alignItems:"center",gap:"12px",marginBottom:"18px"},[secTitle("PORTAL DEL CLIENTE"),badge("Solo lectura",G.blue)]));
  var totalV=acts.reduce(function(s,a){return s+(a.ventas?a.ventas.length:0);},0);
  var totalP=acts.reduce(function(s,a){return s+(a.premiosEntregados||0);},0);
  var kpis=div({display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(100px,1fr))",gap:"12px",marginBottom:"20px"});
  [{l:"Activaciones",v:acts.length,c:G.accent,i:"🚀"},{l:"Ventas",v:totalV,c:G.green,i:"💰"},{l:"Premios",v:totalP,c:G.purple,i:"🎁"}].forEach(function(k){
    kpis.appendChild(card([div({fontSize:"22px"},[k.i]),div({fontWeight:"800",fontSize:"26px",color:k.c},[String(k.v)]),div({fontSize:"10px",color:G.muted,textTransform:"uppercase"},[k.l])],{textAlign:"center",padding:"14px"}));
  });
  wrap.appendChild(kpis);
  if(!acts.length){wrap.appendChild(card([div({color:G.muted,textAlign:"center",padding:"30px"},["Aún no hay activaciones registradas."])]));return wrap;}
  wrap.appendChild(div({fontWeight:"700",marginBottom:"10px",color:G.accentLight,fontSize:"13px"},["📋 ÚLTIMAS ACTIVACIONES"]));
  [].concat(acts).reverse().slice(0,15).forEach(function(a){
    var aC=card([div({display:"flex",justifyContent:"space-between",flexWrap:"wrap",gap:"8px"},[
      div({},[div({fontWeight:"700",fontSize:"15px"},[a.marca]),div({fontSize:"12px",color:G.muted},[(a.lugar||"").slice(0,40)+" · "+a.fecha])]),
      div({display:"flex",gap:"6px"},[badge((a.ventas?a.ventas.length:0)+" ventas",G.green),badge((a.premiosEntregados||0)+" premios",G.purple)]),
    ])],{marginBottom:"10px"});
    encs.filter(function(e){return e.activacionId===a.id;}).forEach(function(enc){
      var encEl=div({background:G.surface,borderRadius:"6px",padding:"5px 10px",fontSize:"12px",marginTop:"6px"});
      encEl.textContent="⭐".repeat(enc.calificacion)+(enc.comentario?" — "+enc.comentario:"");
      aC.appendChild(encEl);
    });
    wrap.appendChild(aC);
  });
  return wrap;
}

// ── CSV ────────────────────────────────────────────────────────────────────
function exportCSV(){
  var db=getDB();var acts=db.activaciones;
  var h=["Fecha","Promotor","Marca","Lugar","Hora","Ventas","Premios","Inv.Inicio","Inv.Final","Diferencia"];
  var rows=acts.map(function(a){
    var usado=(+a.inicioInventario||0)-(+(a.finalInventario||0));
    return[a.fecha,a.nombre,a.marca,a.lugar,a.timestamp,a.ventas?a.ventas.length:0,a.premiosEntregados||0,a.inicioInventario||0,a.finalInventario||0,usado-(a.premiosEntregados||0)];
  });
  var csv=[h].concat(rows).map(function(r){return r.map(function(c){return'"'+c+'"';}).join(",");}).join("\n");
  var blob=new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8;"});
  var url=URL.createObjectURL(blob);
  var a=document.createElement("a");a.href=url;a.download="activaciones_"+todayStr().replace(/\//g,"-")+".csv";a.click();URL.revokeObjectURL(url);
  toast("📤 CSV exportado correctamente","success");
}

render();
</script>
